# LOBOTOMY configuration
# Copy to config.yaml and edit for your environment.

# Claude Code binary
claude_command: claude

# Telegram bot
telegram:
  token: ""               # BotFather token
  chat_id: ""             # Auto-detected on first message

# Laptop bridge (Tailscale SSH, read-only)
laptop:
  enabled: false
  hostname: maxs-laptop   # Tailscale hostname
  ssh_key: ~/.ssh/laptop_key
  user: lobotomy

# WhatsApp group monitor
whatsapp:
  enabled: false
  group_jid: ""           # Group JID or "auto"
  mcp_dir: ./whatsapp-mcp
  triggers:
    - "sansen"

# Trello API
trello:
  api_key: ""
  api_secret: ""
  api_token: ""

# Email delivery (Gmail SMTP)
email:
  enabled: false
  from: ""
  to: ""
  app_password: ""
